<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Цветы — Доставка премиум букетов</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; color: #1a1a1a; background: #fff; line-height: 1.6; }

        /* Улучшенный Hero-блок */
        .hero {
            height: 85vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1490750183084-5a210f924ce2?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #ffffff;
            padding: 20px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .hero p { font-size: 20px; margin-bottom: 30px; opacity: 0.9; }

        .cta-btn {
            background: #ffffff;
            color: #1a1a1a;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .cta-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        /* Остальные стили сохраняем для структуры */
        .catalog-container { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 40px; text-align: center; margin-bottom: 40px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        
        .product-card { border-radius: 20px; overflow: hidden; background: #f9f9f9; transition: 0.3s; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .product-img { width: 100%; height: 350px; object-fit: cover; }
        .product-info { padding: 25px; }
        
        /* Стили для кнопок внутри карточек */
        .btn-buy {
            display: block;
            background: #1a1a1a;
            color: #fff;
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            text-decoration: none;
            margin-top: 15px;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .hero h1 { font-size: 36px; }
        }
    </style>
</head>
<body>

    <!-- Главный экран -->
    <section class="hero">
        <h1>Дарите эмоции, <br>а не просто цветы</h1>
        <p>Премиальная доставка букетов с гарантией свежести</p>
        <a href="#catalog" class="cta-btn">Выбрать букет</a>
    </section>

    <!-- Каталог -->
    <main id="catalog" class="catalog-container">
        <h2 class="section-title">Наши лучшие композиции</h2>
        <div class="products-grid">
            
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=800&q=80" class="product-img">
                <div class="product-info">
                    <h3>Гранд Розы</h3>
                    <p>Классика в современной упаковке</p>
                    <a href="#" class="btn-buy" onclick="alert('Заказ оформлен')">3500 ₽</a>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1533608288-df346bc7640f?auto=format&fit=crop&w=800&q=80" class="product-img">
                <div class="product-info">
                    <h3>Пиономания</h3>
                    <p>Роскошь в шляпной коробке</p>
                    <a href="#" class="btn-buy" onclick="alert('Заказ оформлен')">5500 ₽</a>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
