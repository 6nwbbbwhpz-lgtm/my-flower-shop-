        const myPhoneNumber = "79280126881"; 

        // Ваши загруженные фотографии
        const uploadedPhotos = [
            "PHOTO-2025-06-07-00-47-47.jpeg", "PHOTO-2025-06-07-00-54-49.jpeg",
            "PHOTO-2025-06-07-01-03-23.jpeg", "PHOTO-2025-06-26-23-37-17.jpeg",
            "PHOTO-2025-06-26-23-37-26.jpeg", "PHOTO-2025-06-29-01-24-00 5.jpeg",
            "PHOTO-2025-06-29-01-24-00 6.jpeg", "PHOTO-2025-06-29-01-24-00 7.jpeg",
            "PHOTO-2025-06-29-01-24-01 2.jpeg", "PHOTO-2025-06-29-01-24-01 3.jpeg",
            "PHOTO-2025-06-29-01-24-01 4.jpeg", "PHOTO-2025-06-29-01-24-01.jpeg",
            "PHOTO-2025-06-29-16-03-20.jpeg", "PHOTO-2025-06-29-16-04-06.jpeg",
            "PHOTO-2025-06-29-16-26-51.jpeg", "PHOTO-2025-06-29-16-55-32.jpeg",
            "PHOTO-2025-06-29-16-56-11.jpeg", "PHOTO-2025-06-29-16-58-52.jpeg",
            "PHOTO-2025-06-29-17-05-25.jpeg", "PHOTO-2025-07-06-21-46-41.jpeg",
            "PHOTO-2025-07-06-22-14-19.jpeg", "PHOTO-2025-07-06-22-16-25.jpeg",
            "PHOTO-2025-07-06-22-17-39.jpeg", "PHOTO-2025-07-08-18-00-15.jpeg",
            "PHOTO-2025-07-12-21-35-36.jpeg", "PHOTO-2025-07-13-17-43-49 2.jpeg",
            "PHOTO-2025-07-13-17-43-49 3.jpeg", "PHOTO-2025-07-13-17-43-49 4.jpeg",
            "PHOTO-2025-07-13-18-29-54 2.jpeg", "PHOTO-2025-07-13-18-29-54.jpeg",
            "PHOTO-2025-07-13-21-46-44 2.jpeg", "PHOTO-2025-07-13-21-46-44 3.jpeg",
            "PHOTO-2025-07-13-21-46-44 4.jpeg", "PHOTO-2025-07-13-21-46-44 5.jpeg",
            "PHOTO-2025-07-13-21-46-44.jpeg", "PHOTO-2025-07-13-21-47-25.jpeg",
            "PHOTO-2025-07-16-15-25-04 2.jpeg", "PHOTO-2025-07-16-15-25-04.jpeg",
            "jessie-daniella-QLuleNy8LMM-unsplash.jpeg"
        ];

        // База данных для 55 товаров
        const bouquetInfo = [
            { name: "Пионовый рай", price: 3900, desc: "Пышные розы" },
            { name: "Элегантность", price: 3900, desc: "Розы и зелень" },
            { name: "Классика страсти", price: 4500, desc: "Красные розы" },
            { name: "Утренняя роса", price: 5800, desc: "Герберы и розы" },
            { name: "Ромашковое поле", price: 4500, desc: "Хризантемы и розы" },
            { name: "Небесная свежесть", price: 3500, desc: "Микс в голубом" },
            { name: "Розовое облако", price: 3900, desc: "Кустовые розы" },
            { name: "Зефирная нежность", price: 4500, desc: "Пионы и хризантемы" },
            { name: "Весенний комплимент", price: 5800, desc: "Дизайнерский букет" }
        ];

        // Генерируем каталог на 55 товаров
        const products = [];
        const baseUrl = "https://raw.githubusercontent.com/6nwbbbwhpz-lgtm/----/main/";
        
        for (let i = 1; i <= 55; i++) {
            let info = bouquetInfo[(i - 1) % bouquetInfo.length];
            let fileName = uploadedPhotos[(i - 1) % uploadedPhotos.length];
            
            products.push({
                id: i,
                name: `Букет №${i} — ${info.name}`,
                price: info.price,
                desc: info.desc,
                url: baseUrl + encodeURI(fileName)
            });
        }

        let cart = [];

        // Вывод карточек на экран
        const galleryEl = document.getElementById('gallery');
        products.forEach(prod => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${prod.url}" alt="${prod.name}" onerror="this.src='https://placehold.co/200x150/fff0f2/d63384?text=Фото+букета'">
                <div class="product-title">${prod.name}</div>
                <div style="font-size:11px; color:#666; margin-bottom:5px;">${prod.desc}</div>
                <div class="product-price">${prod.price} руб.</div>
                <button class="add-to-cart-btn" onclick="addToCart(${prod.id})">В корзину</button>
            `;
            galleryEl.appendChild(card);
        });

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const inCart = cart.find(item => item.id === id);
            if (inCart) { inCart.count++; } else { cart.push({ ...product, count: 1 }); }
            updateCartUI();
        }

        function updateCartUI() {
            const cartItemsEl = document.getElementById('cart-items');
            const cartTotalEl = document.getElementById('cart-total');
            if (cart.length === 0) {
                cartItemsEl.innerHTML = '<p style="color: #888; font-style: italic; margin: 0;">Корзина пуста.</p>';
                cartTotalEl.innerText = 'Итого: 0 руб.';
                return;
            }
            cartItemsEl.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.count;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<span>🌸 ${item.name} (x${item.count})</span><span>${item.price * item.count} руб.</span>`;
                cartItemsEl.appendChild(div);
            });
            cartTotalEl.innerText = `Итого: ${total} руб.`;
        }

        function sendOrder(e) {
            e.preventDefault();
            const selectedCity = document.getElementById('city-select').value;
            const extras = [
                { id: 'extra-candy', label: 'Коробка конфет 🍬' },
                { id: 'extra-strawberries', label: 'Клубника в шоколаде 🍓' },
                { id: 'extra-toy', label: 'Мягкая игрушка 🧸' },
                { id: 'extra-card', label: 'Открытка 💌' },
                { id: 'extra-balloons', label: 'Шарики 🎈' },
                { id: 'extra-combo', label: 'VIP-набор 🧺' }
            ];

            let message = `Здравствуйте! Мой заказ:\n📍 *Город:* ${selectedCity}\n\n`;
            let total = 0;

            if (cart.length > 0) {
                message += '*Выбранные букеты:*\n';
                cart.forEach(item => {
                    message += `• ${item.name} — ${item.count} шт. (${item.price * item.count} руб.)\n`;
                    total += item.price * item.count;
                });
                message += `\n*Итого за букеты: ${total} руб.*`;
            }

            let extrasText = '\n\n🎁 *Доп. услуги:*\n';
            let hasExtras = false;
            extras.forEach(ex => {
                if (document.getElementById(ex.id).checked) {
                    extrasText += `• ${ex.label}\n`;
                    hasExtras = true;
                }
            });
            if (hasExtras) message += extrasText;

            if (cart.length === 0 && !hasExtras) {
                alert('Пожалуйста, выберите товар!');
                return;
            }

            window.open(`https://wa.me/${myPhoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
