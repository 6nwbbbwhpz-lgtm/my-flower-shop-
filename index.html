<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Цветы — Премиум доставка</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #fafafa; color: #1a1a1a; line-height: 1.6; }

        /* Главный экран */
        .hero { height: 70vh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1490750183084-5a210f924ce2?auto=format&fit=crop&w=1920&q=80') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 50px; margin-bottom: 20px; }
        .cta-btn { background: #fff; color: #1a1a1a; padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: 700; transition: 0.3s; }
        .cta-btn:hover { transform: scale(1.05); }

        /* Каталог */
        .catalog { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 36px; text-align: center; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 15px; }
        .card h3 { font-size: 18px; margin: 15px 0 5px; }
        .card p { font-size: 13px; color: #666; margin-bottom: 10px; flex-grow: 1; }
        .price { font-weight: 700; font-size: 18px; color: #1a1a1a; margin-bottom: 15px; }
        .btn-buy { background: #1a1a1a; color: white; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Дарите эмоции, а не просто цветы</h1>
        <p>100+ авторских букетов с доставкой до двери</p>
        <a href="#catalog" class="cta-btn">Выбрать букет</a>
    </section>

    <div class="catalog" id="catalog">
        <h2 class="section-title">Наша коллекция</h2>
        <div class="grid" id="product-grid"></div>
    </div>

    <script>
        const descriptions = [
            "Нежное сочетание, которое расскажет о ваших чувствах без слов.",
            "Идеальный выбор для тех, кто ценит классику и утонченность.",
            "Авторская композиция, собранная с любовью нашими флористами.",
            "Яркий акцент, способный поднять настроение в самый пасмурный день.",
            "Премиальные сорта цветов для самых особенных моментов вашей жизни."
        ];

        const grid = document.getElementById('product-grid');
        for(let i = 1; i <= 100; i++) {
            const price = 1500 + (i * 40);
            const desc = descriptions[i % descriptions.length];
            // Используем профессиональный сервис Unsplash с тегами цветов
            const flowerImage = `https://images.unsplash.com/photo-1591886894080-60b76962363e?auto=format&fit=crop&w=400&q=80&sig=${i}`;
            
            grid.innerHTML += `
                <div class="card">
                    <img src="${flowerImage}" alt="Букет цветов">
                    <h3>Букет «Премиум №${i}»</h3>
                    <p>${desc}</p>
                    <div class="price">${price} ₽</div>
                    <a href="#" class="btn-buy" onclick="event.preventDefault(); alert('Букет №${i} добавлен в корзину!')">В корзину</a>
                </div>
            `;
        }
    </script>
</body>
</html>
