    <script>
        const myPhoneNumber = "79280126881"; 

        const uploadedPhotos = [
            "PHOTO-2025-06-07-00-47-47.jpeg", "PHOTO-2025-06-07-00-54-49.jpeg", "PHOTO-2025-06-07-01-03-23.jpeg",
            "PHOTO-2025-06-26-23-37-17.jpeg", "PHOTO-2025-06-26-23-37-26.jpeg", "PHOTO-2025-06-29-01-24-00 5.jpeg",
            "PHOTO-2025-06-29-01-24-00 6.jpeg", "PHOTO-2025-06-29-01-24-00 7.jpeg", "PHOTO-2025-06-29-01-24-01 2.jpeg",
            "PHOTO-2025-06-29-01-24-01 3.jpeg", "PHOTO-2025-06-29-01-24-01 4.jpeg", "PHOTO-2025-06-29-01-24-01.jpeg",
            "PHOTO-2025-06-29-16-03-20.jpeg", "PHOTO-2025-06-29-16-04-06.jpeg", "PHOTO-2025-06-29-16-26-51.jpeg",
            "PHOTO-2025-06-29-16-55-32.jpeg", "PHOTO-2025-06-29-16-56-11.jpeg", "PHOTO-2025-06-29-16-58-52.jpeg",
            "PHOTO-2025-06-29-17-05-25.jpeg", "PHOTO-2025-07-06-21-46-41.jpeg", "PHOTO-2025-07-06-22-14-19.jpeg",
            "PHOTO-2025-07-06-22-16-25.jpeg", "PHOTO-2025-07-06-22-17-39.jpeg", "PHOTO-2025-07-08-18-00-15.jpeg",
            "PHOTO-2025-07-12-21-35-36.jpeg", "PHOTO-2025-07-13-17-43-49 2.jpeg", "PHOTO-2025-07-13-17-43-49 3.jpeg",
            "PHOTO-2025-07-13-17-43-49 4.jpeg", "PHOTO-2025-07-13-18-29-54 2.jpeg", "PHOTO-2025-07-13-18-29-54.jpeg",
            "PHOTO-2025-07-13-21-46-44 2.jpeg", "PHOTO-2025-07-13-21-46-44 3.jpeg", "PHOTO-2025-07-13-21-46-44 4.jpeg",
            "PHOTO-2025-07-13-21-46-44 5.jpeg", "PHOTO-2025-07-13-21-46-44.jpeg", "PHOTO-2025-07-13-21-47-25.jpeg",
            "PHOTO-2025-07-16-15-25-04 2.jpeg", "PHOTO-2025-07-16-15-25-04.jpeg", "jessie-daniella-QLuleNy8LMM-unsplash.jpeg"
        ];

        // База данных названий, цен и описаний
        const catalogData = [
            { name: "Пионовый рай", price: 3900, desc: "Пышные розы в нежном оформлении" },
            { name: "Элегантность", price: 3900, desc: "Розы и зелень, подчеркивающее статус" },
            { name: "Классика страсти", price: 4500, desc: "Красные розы — символ чувств" },
            { name: "Утренняя роса", price: 5800, desc: "Герберы и розы в светлой упаковке" },
            { name: "Ромашковое поле", price: 4500, desc: "Хризантемы и нежные розы" },
            { name: "Небесная свежесть", price: 3500, desc: "Микс в стильной голубой упаковке" },
            { name: "Розовое облако", price: 3900, desc: "Кустовые розы и гортензии" },
            { name: "Зефирная нежность", price: 4500, desc: "Воздушный микс пионов" },
            { name: "Весенний комплимент", price: 5800, desc: "Дизайнерский букет из роз" }
        ];

        const products = [];
        const baseUrl = "https://raw.githubusercontent.com/6nwbbbwhpz-lgtm/----/main/";
        
        for (let i = 1; i <= 55; i++) {
            let data = catalogData[(i - 1) % catalogData.length];
            let fileName = uploadedPhotos[(i - 1) % uploadedPhotos.length];
            
            products.push({
                id: i,
                name: `Букет №${i} — ${data.name}`,
                price: data.price,
                desc: data.desc,
                url: baseUrl + encodeURI(fileName)
            });
        }

        let cart = [];
        const galleryEl = document.getElementById('gallery');
        
        products.forEach(prod => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${prod.url}" alt="${prod.name}" onerror="this.src='https://placehold.co/200x150/fff0f2/d63384?text=Фото+букета'">
                <div class="product-title">${prod.name}</div>
                <div style="font-size:10px; color:#777; margin-bottom:5px;">${prod.desc}</div>
                <div class="product-price">${prod.price} руб.</div>
                <button class="add-to-cart-btn" onclick="addToCart(${prod.id})">В корзину</button>
            `;
            galleryEl.appendChild(card);
        });

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const inCart = cart.find(item => item.id === id);
            if (inCart) inCart.count++; else cart.push({ ...product, count: 1 });
            updateCartUI();
        }

        function updateCartUI() {
            const cartItemsEl = document.getElementById('cart-items');
            const cartTotalEl = document.getElementById('cart-total');
            if (cart.length === 0) {
                cartItemsEl.innerHTML = '<p style="color: #888; font-style: italic; margin: 0;">Корзина пуста.</p>';
                cartTotalEl.innerText = 'Итого: 0 руб.';
                return;
            }
            cartItemsEl.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.count;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<span>🌸 ${item.name}</span><span>${item.price} руб.</span>`;
                cartItemsEl.appendChild(div);
            });
            cartTotalEl.innerText = `Итого: ${total} руб.`;
        }

        function sendOrder(e) {
            e.preventDefault();
            const city = document.getElementById('city-select').value;
            let msg = `Здравствуйте! Хочу заказать букеты:\n📍 Город: ${city}\n\n`;
            let total = 0;
            
            cart.forEach(i => { msg += `• ${i.name} — ${i.price} руб.\n`; total += i.price; });
            
            const extras = ["candy", "strawberries", "toy", "card", "balloons", "combo"];
            let hasExtras = false;
            extras.forEach(id => {
                if (document.getElementById('extra-'+id).checked) {
                    if (!hasExtras) { msg += "\n🎁 Дополнения:\n"; hasExtras = true; }
                    msg += `• ${document.querySelector('label[for="extra-'+id+'"] span').innerText}\n`;
                }
            });
            
            msg += `\n*Итого: ${total} руб.*`;
            window.open(`https://wa.me/${myPhoneNumber}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
