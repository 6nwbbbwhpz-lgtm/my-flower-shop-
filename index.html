<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Цветы — Премиум доставка</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #fafafa; color: #1a1a1a; line-height: 1.6; }

        .hero { height: 60vh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1490750183084-5a210f924ce2?auto=format&fit=crop&w=1920&q=80') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 45px; margin-bottom: 20px; }
        
        .catalog { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 32px; text-align: center; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }
        .card h3 { font-size: 18px; margin-bottom: 8px; }
        .card p { font-size: 13px; color: #666; margin-bottom: 15px; flex-grow: 1; }
        .price { font-weight: 700; font-size: 18px; margin-bottom: 15px; }
        .btn-buy { background: #1a1a1a; color: white; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Наша коллекция букетов</h1>
        <p>50 уникальных композиций для ваших любимых</p>
    </section>

    <div class="catalog">
        <h2 class="section-title">Каталог цветов</h2>
        <div class="grid" id="product-grid"></div>
    </div>

    <script>
        const descriptions = [
            "Нежное сочетание, которое расскажет о ваших чувствах.",
            "Классика и утонченность в каждом лепестке.",
            "Авторская композиция от наших лучших флористов.",
            "Яркий акцент для самого прекрасного настроения.",
            "Премиальные сорта для самых важных моментов."
        ];

        const grid = document.getElementById('product-grid');
        // Цикл теперь до 50
        for(let i = 1; i <= 50; i++) {
            const price = 1500 + (i * 60);
            const desc = descriptions[i % descriptions.length];
            const imgUrl = `https://images.unsplash.com/photo-1591886894080-60b76962363e?auto=format&fit=crop&w=400&q=80&sig=${i}`;
            
            grid.innerHTML += `
                <div class="card">
                    <img src="${imgUrl}" alt="Букет цветов">
                    <h3>Букет №${i}</h3>
                    <p>${desc}</p>
                    <div class="price">${price} ₽</div>
                    <a href="#" class="btn-buy" onclick="event.preventDefault(); alert('Букет №${i} добавлен в корзину!')">В корзину</a>
                </div>
            `;
        }
    </script>
</body>
</html>
