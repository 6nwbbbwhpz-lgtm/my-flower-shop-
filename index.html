<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цветочная мастерская 24/7</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; margin: 0; color: #333; }
        .info-bar { background: #ffd700; text-align: center; padding: 10px; font-weight: bold; }
        .header { background: #1a1a1a; color: white; text-align: center; padding: 30px 20px; }
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px; max-width: 1100px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .card img { width: 100%; height: 300px; object-fit: cover; border-radius: 15px; }
        .btn-wa { display: block; background: #25D366; color: white; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; margin-top: 15px; font-weight: bold; }
        select { padding: 12px; width: 100%; max-width: 300px; margin-top: 15px; border-radius: 8px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div class="info-bar">🚚 Доставка цветов на дом 24/7</div>
    
    <div class="header">
        <h1>Цветочная мастерская</h1>
        <p>Конфеты, шампанское, открытки и записки к каждому букету!</p>
        <select id="citySelect">
            <option>Москва</option>
            <option>Санкт-Петербург</option>
            <option>Краснодар</option>
            <option>Казань</option>
            <option>Новосибирск</option>
        </select>
    </div>

    <div class="catalog" id="catalog"></div>

    <script>
        const catalog = document.getElementById('catalog');
        const phone = "79280126881"; // Ваш номер
        const city = document.getElementById('citySelect');

        // Цикл на 10 ваших фото
        for(let i = 1; i <= 10; i++) {
            catalog.innerHTML += `
                <div class="card">
                    <img src="images/${i}.jpg" alt="Букет ${i}">
                    <h3>Букет №${i}</h3>
                    <p>Комплект: цветы, конфеты, шампанское, открытка.</p>
                    <div style="font-weight:bold; margin-top:10px;">Цена: 2500 ₽</div>
                    <a href="#" class="btn-wa" onclick="sendOrder(${i})">Заказать в WhatsApp</a>
                </div>
            `;
        }

        function sendOrder(id) {
            const selectedCity = city.value;
            const message = `Здравствуйте! Хочу заказать Букет №${id} в город ${selectedCity}.`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
