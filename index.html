<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Магия Цветов — Каталог</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #fff9fa; color: #333; }
        header { background-color: #d63384; color: white; text-align: center; padding: 20px 10px; }
        h1 { margin: 0; font-size: 24px; }
        .container { max-width: 800px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        
        /* Верхние блоки */
        .top-section { background: white; border: 1px solid #ffccd5; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .city-box { margin-bottom: 15px; }
        .city-box select { padding: 8px; width: 100%; border: 1px solid #d63384; border-radius: 8px; font-size: 16px; }
        
        /* Дополнения */
        .extra-section h2 { color: #d63384; font-size: 18px; margin-top: 0; margin-bottom: 10px; }
        .extra-option { display: flex; align-items: center; gap: 10px; padding: 5px 0; cursor: pointer; }
        
        /* Корзина */
        .cart-section { border: 2px solid #25D366; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .whatsapp-btn { background-color: #25D366; color: white; text-decoration: none; display: block; text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; width: 100%; }

        /* Галерея */
        .gallery { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
        .product-card { background: white; border: 1px solid #ffccd5; border-radius: 12px; width: 46%; max-width: 220px; padding: 8px; display: flex; flex-direction: column; align-items: center; }
        .product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
        .add-to-cart-btn { background-color: #d63384; color: white; border: none; padding: 6px 10px; border-radius: 20px; width: 100%; font-size: 11px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>
    <header><h1>🌸 Цветочная мастерская</h1></header>
    <div class="container">
        
        <div class="top-section">
            <div class="city-box">
                <label>📍 Город доставки:</label>
                <select id="city-select">
                    <option value="Москва">Москва</option>
                    <option value="Санкт-Петербург">Санкт-Петербург</option>
                    <option value="Краснодар">Краснодар</option>
                    <option value="Екатеринбург">Екатеринбург</option>
                    <option value="Другой город">Другой город</option>
                </select>
            </div>
            
            <div class="extra-section">
                <h2>🎁 Добавить к букету</h2>
                <label class="extra-option"><input type="checkbox" id="extra-candy"> 🍬 Конфеты</label>
                <label class="extra-option"><input type="checkbox" id="extra-strawberries"> 🍓 Клубника</label>
                <label class="extra-option"><input type="checkbox" id="extra-toy"> 🧸 Игрушка</label>
                <label class="extra-option"><input type="checkbox" id="extra-card"> 💌 Открытка</label>
            </div>
        </div>

        <div class="cart-section">
            <h2>🛒 Ваша корзина</h2>
            <div id="cart-items">Корзина пуста</div>
            <div id="cart-total" style="font-weight: bold; margin: 10px 0;">Итого: 0 руб.</div>
            <button class="whatsapp-btn" onclick="sendOrder()">Заказать в WhatsApp</button>
        </div>

        <div class="gallery" id="gallery"></div>
    </div>

    <script>
        const myPhoneNumber = "79280126881";
        // ... (остальной JavaScript остается прежним, функции addToCart и sendOrder будут работать с чекбоксами)
        
        function sendOrder() {
            let city = document.getElementById('city-select').value;
            let msg = `Заказ из г. ${city}:\n`;
            // Добавляем букеты...
            // Добавляем дополнения, если checked:
            if(document.getElementById('extra-candy').checked) msg += "+ Конфеты\n";
            if(document.getElementById('extra-strawberries').checked) msg += "+ Клубника\n";
            if(document.getElementById('extra-toy').checked) msg += "+ Игрушка\n";
            if(document.getElementById('extra-card').checked) msg += "+ Открытка\n";
            
            window.open(`https://wa.me/${myPhoneNumber}?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
