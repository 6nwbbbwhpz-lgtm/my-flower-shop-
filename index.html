<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Цветы — Премиум доставка</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #fafafa; color: #1a1a1a; line-height: 1.6; }

        .hero { height: 60vh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1490750183084-5a210f924ce2?auto=format&fit=crop&w=1920&q=80') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 40px; margin-bottom: 20px; }
        
        .catalog { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 32px; text-align: center; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }
        .card h3 { font-size: 18px; margin-bottom: 8px; }
        .card p { font-size: 13px; color: #666; margin-bottom: 15px; flex-grow: 1; }
        .price { font-weight: 700; font-size: 18px; margin-bottom: 15px; }
        .btn-buy { background: #1a1a1a; color: white; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Наша коллекция букетов</h1>
        <p>10 избранных композиций для ваших любимых</p>
    </section>

    <div class="catalog">
        <h2 class="section-title">Каталог цветов</h2>
        <div class="grid" id="product-grid"></div>
    </div>

    <script>
        // Фиксированные ссылки на качественные фото цветов
        const images = [
            "https://images.unsplash.com/photo-1562690868-60bbe7293e94?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1597290282695-edc22d0d3a5a?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1582794543137-a84577c1c42b?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1533608288-df346bc7640f?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1526047932273-341f2a7631f9?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1460355976672-73c3c0a52148?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1596704017254-9b5c10898154?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1550159930-400627263595?auto=format&fit=crop&w=600&q=80",
            "https://images.unsplash.com/photo-1507608869298-cf3b7f884a44?auto=format&fit=crop&w=600&q=80"
        ];

        const grid = document.getElementById('product-grid');
        for(let i = 0; i < 10; i++) {
            grid.innerHTML += `
                <div class="card">
                    <img src="${images[i]}" alt="Букет цветов">
                    <h3>Букет «Премиум №${i + 1}»</h3>
                    <p>Идеальный выбор для тех, кто ценит классику и утонченность.</p>
                    <div class="price">${2000 + (i * 150)} ₽</div>
                    <a href="#" class="btn-buy" onclick="event.preventDefault(); alert('Букет №${i + 1} добавлен в корзину!')">В корзину</a>
                </div>
            `;
        }
    </script>
</body>
</html>
