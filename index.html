<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Магия Цветов — Каталог</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #fff9fa; color: #333; }
        .container { max-width: 800px; margin: 0 auto; padding: 15px; }
        header { background-color: #d63384; color: white; text-align: center; padding: 20px 10px; }
        .city-box { background: white; border: 1px solid #ffccd5; border-radius: 12px; padding: 12px; margin-bottom: 20px; }
        .extra-services-section, .cart-section { background: white; border: 1px solid #ffccd5; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .gallery { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .product-card { background: white; border: 1px solid #ffccd5; border-radius: 12px; width: 45%; padding: 8px; text-align: center; }
        .product-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; }
        .add-to-cart-btn { background-color: #d63384; color: white; border: none; padding: 8px; border-radius: 20px; width: 100%; cursor: pointer; }
        .whatsapp-btn { background-color: #25D366; color: white; padding: 12px; border-radius: 8px; text-align: center; display: block; font-weight: bold; cursor: pointer; border: none; width: 100%; }
    </style>
</head>
<body>
    <header><h1>🌸 Цветочная мастерская</h1></header>
    <div class="container">
        <div class="city-box">
            <label>📍 Город:</label>
            <select id="city-select"><option>Москва</option><option>Санкт-Петербург</option></select>
        </div>
        <div class="extra-services-section">
            <h2>🎁 Дополнения</h2>
            <label><input type="checkbox" id="extra-candy"> 🍬 Конфеты</label><br>
            <label><input type="checkbox" id="extra-toy"> 🧸 Игрушка</label><br>
            <label><input type="checkbox" id="extra-card"> 💌 Открытка</label>
        </div>
        <div class="cart-section">
            <h2>🛒 Корзина</h2>
            <div id="cart-items"></div>
            <div id="cart-total" style="font-weight:bold; margin: 10px 0;">Итого: 0 руб.</div>
            <button class="whatsapp-btn" onclick="sendOrder()">Заказать в WhatsApp</button>
        </div>
        <div class="gallery" id="gallery"></div>
    </div>

    <script>
        const myPhoneNumber = "79280126881";
        const uploadedPhotos = ["PHOTO-2025-06-07-00-47-47.jpeg", "PHOTO-2025-06-07-00-54-49.jpeg"];
        const baseUrl = "https://raw.githubusercontent.com/6nwbbbwhpz-lgtm/----/main/";
        let cart = [];

        for (let i = 1; i <= 5; i++) {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `<img src="${baseUrl}${uploadedPhotos[0]}"><div>Букет №${i}</div><div style="color:#d63384">3500 руб.</div><button class="add-to-cart-btn" onclick="addToCart('Букет №${i}', 3500)">В корзину</button>`;
            document.getElementById('gallery').appendChild(card);
        }

        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cart-items').innerHTML += `<div>${name} — ${price} руб.</div>`;
            let total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = 'Итого: ' + total + ' руб.';
        }

        function sendOrder() {
            let msg = "Заказ: " + cart.map(i => i.name).join(", ");
            if(document.getElementById('extra-candy').checked) msg += " + Конфеты";
            window.open("https://wa.me/" + myPhoneNumber + "?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
