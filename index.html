<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой цветочный магазин</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; padding: 20px; }
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; }
        .btn { display: block; background: #000; color: #fff; text-align: center; padding: 10px; border-radius: 5px; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">Наши букеты</h1>
    <div class="catalog" id="catalog"></div>

    <script>
        const catalog = document.getElementById('catalog');
        
        // Цикл создает 10 карточек, подставляя имена файлов от 1.jpg до 10.jpg
        for(let i = 1; i <= 10; i++) {
            catalog.innerHTML += `
                <div class="card">
                    <img src="images/${i}.jpg" alt="Букет ${i}">
                    <h3>Букет №${i}</h3>
                    <p>Цена: 2500 ₽</p>
                    <a href="#" class="btn">Заказать</a>
                </div>
            `;
        }
    </script>
</body>
</html>
