<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Магия Цветов</title>
    <style>
        body { font-family: sans-serif; background-color: #fff9fa; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        .top-section { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ffccd5; margin-bottom: 20px; }
        .cart-section { border: 2px solid #25D366; padding: 15px; border-radius: 12px; margin-bottom: 20px; background: white; }
        .gallery { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .product-card { background: white; border: 1px solid #ffccd5; border-radius: 12px; width: 46%; padding: 8px; text-align: center; }
        .product-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; }
        .whatsapp-btn { background-color: #25D366; color: white; padding: 12px; border-radius: 8px; text-align: center; display: block; font-weight: bold; border: none; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-section">
            <label>📍 Город доставки:</label>
            <select id="city-select" style="width:100%; padding:8px; margin-bottom:15px;">
                <option value="Москва">Москва</option>
                <option value="Санкт-Петербург">Санкт-Петербург</option>
                <option value="Краснодар">Краснодар</option>
                <option value="Екатеринбург">Екатеринбург</option>
                <option value="Другой город">Другой город</option>
            </select>
            
            <h3>🎁 Добавить к букету</h3>
            <label><input type="checkbox" id="extra-candy"> 🍬 Конфеты</label><br>
            <label><input type="checkbox" id="extra-strawberries"> 🍓 Клубника в шоколаде</label><br>
            <label><input type="checkbox" id="extra-toy"> 🧸 Мягкая игрушка</label><br>
            <label><input type="checkbox" id="extra-card"> 💌 Открытка</label>
        </div>

        <div class="cart-section">
            <h2>🛒 Ваша корзина</h2>
            <div id="cart-list">Корзина пуста</div>
            <div id="cart-total" style="font-weight:bold; margin-top:10px;">Итого: 0 руб.</div>
            <button class="whatsapp-btn" onclick="sendOrder()">Заказать в WhatsApp</button>
        </div>

        <h3>🌸 Букеты</h3>
        <div class="gallery" id="gallery"></div>
    </div>

    <script>
        const myPhoneNumber = "79280126881";
        const baseUrl = "https://raw.githubusercontent.com/6nwbbbwhpz-lgtm/----/main/";
        const photos = ["PHOTO-2025-06-07-00-47-47.jpeg", "PHOTO-2025-06-29-16-03-20.jpeg", "PHOTO-2025-07-13-17-43-49 2.jpeg"];
        const descs = ["Авторский букет", "Классические розы", "Нежная композиция"];
        let cart = [];

        const gallery = document.getElementById('gallery');
        for (let i = 1; i <= 55; i++) {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${baseUrl}${photos[i % photos.length]}" alt="Букет">
                <div style="font-weight:bold; font-size:14px;">Букет №${i}</div>
                <div style="font-size:11px; color:#666;">${descs[i % descs.length]}</div>
                <div style="color:#d63384; font-weight:bold;">3500 руб.</div>
                <button onclick="addToCart('Букет №${i}', 3500)" style="width:100%; margin-top:5px;">В корзину</button>
            `;
            gallery.appendChild(card);
        }

        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cart-list').innerText = cart.map(i => i.name).join(', ');
            document.getElementById('cart-total').innerText = 'Итого: ' + cart.reduce((s, i) => s + i.price, 0) + ' руб.';
        }

        function sendOrder() {
            let extras = [];
            if(document.getElementById('extra-candy').checked) extras.push("Конфеты");
            if(document.getElementById('extra-strawberries').checked) extras.push("Клубника");
            if(document.getElementById('extra-toy').checked) extras.push("Игрушка");
            if(document.getElementById('extra-card').checked) extras.push("Открытка");
            
            let msg = `Заказ из ${document.getElementById('city-select').value}:\n${cart.map(i => i.name).join(', ')}`;
            if(extras.length > 0) msg += "\nДополнения: " + extras.join(", ");
            
            window.open("https://wa.me/" + myPhoneNumber + "?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
